site_name: Garden Controller
site_description: Arduino-based garden environmental telemetry with automated irrigation
site_url: https://ianlintner.github.io/gardencontroller
repo_name: ianlintner/gardencontroller
repo_url: https://github.com/ianlintner/gardencontroller
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Setup:
    - Calibration: calibration.md
  - Superpowers:
    - Plans:
      - OpenClaw Irrigation: superpowers/plans/2026-06-02-openclaw-irrigation.md
      - LED Slideshow: superpowers/plans/2026-06-03-led-slideshow.md
      - OTA Firmware: superpowers/plans/2026-06-03-ota-firmware.md
    - Specs:
      - OpenClaw Irrigation Design: superpowers/specs/2026-06-02-openclaw-irrigation-design.md
      - LED Slideshow Design: superpowers/specs/2026-06-03-led-slideshow-design.md
      - OTA Firmware Design: superpowers/specs/2026-06-03-ota-firmware-design.md
