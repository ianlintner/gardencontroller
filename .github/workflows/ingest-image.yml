name: ingest-image

# Build and publish the garden-ingest container image to GHCR.
# Runs the test suite first, then builds linux/amd64 (AKS node arch) and pushes
# :latest plus the commit SHA. The cluster (Flux) pulls ghcr.io/ianlintner/garden-ingest.
on:
  push:
    branches: [main]
    paths:
      - "ingest/**"
      - ".github/workflows/ingest-image.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/garden-ingest

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ./ingest
          # AKS nodes are arm64; amd64 included for portability/local dev.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
