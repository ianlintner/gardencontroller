name: firmware-release

# Builds the garden-node firmware and publishes a GitHub Release on v* tags.
# The release includes:
#   version.txt  — plain version string (e.g. "1.2.0"), used by the board's OTA check
#   garden-node.ota — LZSS-compressed firmware, fetched and flashed by OTAUpdate
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.0)"
        required: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # needed to create GitHub Releases
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          # On push: github.ref_name is the tag (e.g. "v1.0.1")
          # On workflow_dispatch: github.ref_name is the branch; use the input tag
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" != v* ]]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install R4 core + libraries
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:renesas_uno
          arduino-cli lib install "ArduinoHttpClient" "ArduinoJson" "DHT sensor library"

      - name: Write dummy secrets file
        run: |
          cat > firmware/garden-node/arduino_secrets.h << 'EOF'
          #pragma once
          #define SECRET_WIFI_SSID "ci"
          #define SECRET_WIFI_PASS "ci"
          #define SECRET_OAUTH_CLIENT_ID "ci"
          #define SECRET_OAUTH_CLIENT_SECRET "ci"
          EOF

      - name: Set ENABLE_UPLOAD=1 for release build
        run: |
          sed -i 's/#define ENABLE_UPLOAD 0/#define ENABLE_UPLOAD 1/' \
            firmware/garden-node/config.h

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn arduino:renesas_uno:unor4wifi \
            --output-dir /tmp/build \
            firmware/garden-node
          ls -lh /tmp/build/

      - name: Install OTA conversion tool
        run: |
          pip install arduino-iot-cloud --quiet
          # Locate lzss.py and its companion .so from the installed package
          LZSS_PY=$(python3 -c "
          import importlib.util, pathlib
          spec = importlib.util.find_spec('arduino_iot_cloud')
          if spec:
              pkg = pathlib.Path(spec.origin).parent
              candidates = list(pkg.rglob('lzss.py'))
              print(candidates[0] if candidates else '')
          ")
          if [ -z "$LZSS_PY" ]; then
            echo "lzss.py not found in arduino-iot-cloud, fetching from ArduinoIoTCloud repo"
            curl -fsSL https://raw.githubusercontent.com/arduino-libraries/ArduinoIoTCloud/master/extras/tools/lzss.py \
              -o /tmp/lzss.py
            curl -fsSL https://raw.githubusercontent.com/arduino-libraries/ArduinoIoTCloud/master/extras/tools/lzss.so \
              -o /tmp/lzss.so 2>/dev/null || true
          else
            cp "$LZSS_PY" /tmp/lzss.py
            SO_DIR=$(dirname "$LZSS_PY")
            cp "$SO_DIR"/lzss.so /tmp/lzss.so 2>/dev/null || \
              cp "$SO_DIR"/lzss.dylib /tmp/lzss.so 2>/dev/null || true
          fi
          ls -lh /tmp/lzss.py /tmp/lzss.so 2>/dev/null || echo "lzss.so not found - will try gcc build"
          # Build lzss.so from source if not available
          if [ ! -f /tmp/lzss.so ]; then
            curl -fsSL https://raw.githubusercontent.com/arduino-libraries/ArduinoIoTCloud/master/extras/tools/lzss.c \
              -o /tmp/lzss.c
            gcc -shared -fPIC -O2 -o /tmp/lzss.so /tmp/lzss.c
            echo "Built lzss.so from source: $(ls -lh /tmp/lzss.so)"
          fi

      - name: Convert .bin to .ota (LZSS compress)
        run: |
          BIN=$(ls /tmp/build/*.bin | head -1)
          echo "Binary: $BIN ($(wc -c < "$BIN") bytes)"
          cd /tmp && python3 /tmp/lzss.py --encode "$BIN" /tmp/garden-node.ota
          echo "OTA:    $(wc -c < /tmp/garden-node.ota) bytes"

      - name: Write version.txt
        run: echo -n "${{ steps.version.outputs.version }}" > /tmp/version.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Firmware ${{ steps.version.outputs.version }}" \
            --notes "Garden node firmware release ${{ steps.version.outputs.version }}" \
            /tmp/version.txt \
            /tmp/garden-node.ota
