name: mcp-image

# Build and publish the garden-tuya-mcp sidecar image to GHCR.
# Runs the irrigation test suite first (core + gateway + budget + server-build),
# then builds linux/amd64,arm64 and pushes :latest plus the commit SHA.
# The cluster (Flux) pulls ghcr.io/ianlintner/garden-tuya-mcp as an OpenClaw sidecar.
on:
  push:
    branches: [main]
    paths:
      - "irrigation/garden_core.py"
      - "irrigation/mcp/**"
      - ".github/workflows/mcp-image.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/garden-tuya-mcp

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: irrigation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt -r mcp/requirements.txt
      - run: python -m pytest -q

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          # Build context is irrigation/ so the Dockerfile can COPY garden_core.py.
          context: ./irrigation
          file: ./irrigation/mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
