# Self-contained local test stack — no cluster, no hardware.
#   docker compose -f local/docker-compose.yml up -d --build
#   python scripts/simulate.py            # push simulated readings
#   open http://localhost:3000            # Grafana → "Garden Overview"
#
# Mirrors the prod path (ingest → Pushgateway → Prometheus → Grafana) but with
# no istio/JWT (the ingest service trusts the edge, so local posts need no auth).
services:
  ingest:
    build: ../ingest
    environment:
      - PUSHGATEWAY_URL=http://pushgateway:9091
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"
    depends_on:
      - pushgateway

  pushgateway:
    image: prom/pushgateway:v1.10.0
    ports:
      - "9091:9091"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - pushgateway

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
